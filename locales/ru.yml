about:
  p1: FlyBeeper — устройства для парапланов и дельтапланов. Приборы имеют различные датчики. Обработанные данные передаются через Bluetooth.
  p2: Это веб-приложение умеет подключаться к устройству, изменять его настройки, отображать все передаваемые с устройства данные. Здесь можно найти последнюю версию прошивки, историю изменений и описание процедуры обновления. Кроме того, при наличии разрешения, можно отображать данные спутниковой навигации.
  location-permission: Запрос разрешения на доступ к местоположению
  geo-granted: Доступ к местоположению разрешен
  geo-denied: Доступ к местоположению запрещен. Откройте настройки браузера для разрешения.
  p3: Приложение можно установить и использовать оффлайн.
  install-app: Установить приложение
  p4: Подробное описание проекта можно найти на странице проекта или в магазине.
  link-market: Магазин FlyBeeper
  alpisto-eyebrow: РАЗРАБОТАНО ALPISTO
  alpisto-title: Working code, not slide decks.
  alpisto-body: 'Железо и прошивки FlyBeeper делаются в Alpisto — инженерной практике одного человека в Тольмине (Словения), которую ведёт Евгений Истомин. Двадцать лет nRF52, BLE-протоколов, KiCad-плат и бэкендов — всё руками, без аутсорса и без слайдов.'
  alpisto-services: 'Embedded BLE (nRF52, Zephyr, ESP32) · IoT-бэкенды (FastAPI, NATS, MQTT) · миграции MATLAB → Python · техническая экспертиза.'
  alpisto-address: 'Rutarjeva ulica 15, 5220 Tolmin, Slovenia · VAT SI91102227'
  alpisto-cta: Открыть alpisto.eu
  contact-eyebrow: НАПИСАТЬ
  contact-title: Отправить сообщение
  contact-body: 'Баги, вопросы по железу, идеи сотрудничества — пиши. Ответ приходит в течение двух рабочих дней.'
  contact-name: Имя
  contact-name-ph: Необязательно
  contact-email: Почта
  contact-email-ph: 'вы{''@''}пример.ru'
  contact-message: Сообщение
  contact-message-ph: О чём речь?
  contact-send: Отправить
  contact-sending: Отправка…
  contact-success-eyebrow: ОТПРАВЛЕНО
  contact-success-body: Спасибо — сообщение ушло. Ответ придёт на указанный адрес.
  contact-error-eyebrow: НЕ УДАЛОСЬ ОТПРАВИТЬ
  contact-error-body: 'Не удалось достучаться до сервера формы. Проверь интернет и попробуй ещё раз, или напиши на hello{''@''}alpisto.eu напрямую.'
  fbtas-p1: Датчик истинной воздушной скорости с блютус.
  fbminibt-p1: Вариометр с Bluetooth и беспроводными кнопками. Звуковая индикация скорости подъема на основе пользовательских кривых. Батарея устойчива к холоду.
  fbps1-p1: Внешний барометр. Всегда доступен для Bluetooth-подключения. Высокая чувствительность и стабильность с минимальными задержками. Превратите любой смартфон в надежный вариометр.
  fbrc4-p1: 4 внешние кнопки всегда доступны для подключения по Bluetooth.
  fbfanet-p1: Внейшний радиопередатчик с управлением по блютус для приема FANET, ADS-L или подобных радиопакетов. Отправляй и получай любые данные без интернет соединения.
  fbfanetvario-p1: Внешний FANET по Bluetooth и вариометр в одном корпусе с солнечной панелью. Отправляй и получай FANET пакеты без интернет соединения. Используй как чувствительный вариометр и источник барометрической высоты для приложений на смартфоне.
  fbsv-p1: Суперлегкий вариометр с Bluetooth, солнечной панелькой и ионистром. Работает от -25 до +65 °C. 500 тыс. циклов заряд/разряд. 60 секунд зарядки через USB Type C до 100% или 15 минут солнца для включения. Всегда готов с "вечной" батареей.

