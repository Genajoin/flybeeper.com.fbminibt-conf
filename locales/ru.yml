update:
  how-to: Как обновить
  eyebrow: Обновление прошивки
  title-line1: Используйте nRF Connect.
  title-line2: Это работает.
  intro: 'Мы не делаем in-browser OTA. Бесплатное Nordic nRF Connect для мобильных — индустриальный стандарт для прошивки nRF52 — обкатан, поддерживает восстановление и работает на обеих платформах. Пользуйтесь им.'
  callout-eyebrow: Почему не в браузере?
  callout-body: 'Неудачная OTA на вариометре может его «окирпичить». Нативные MCUmgr-клиенты умеют retry, восстановление и проверку подписи. Веб-приложение через нестабильный BLE так не может. Пока SMP-over-WebBLE не получит путь восстановления — пользуйтесь нативным инструментом.'
  step-1-title: Установите nRF Connect Mobile
  step-1-desc: Бесплатно, от Nordic. iOS App Store + Google Play. Работает без аккаунта.
  step-2-title: Включите ваш mini BT
  step-2-desc: Долгое нажатие, пока LED не задышит оранжевым.
  step-3-title: Откройте Device Manager
  step-3-desc: Выберите ваш mini BT из списка. Откроется карточка Device Manager.
  step-4-title: Нажмите Firmware Upgrade
  step-4-desc: Выберите .bin-файл, скачанный с flybeeper.com/firmware. Нажмите Start.
  step-5-title: Подождите 60–90 секунд
  step-5-desc: Прогресс-бар дойдёт до 100%. Устройство перезагрузится. nRF Connect покажет «complete».
  step-6-title: Откройте этот конфигуратор
  step-6-desc: Подключитесь и проверьте, что версия прошивки в статус-баре совпадает.
  cta-ios: nRF · iOS ↗
  cta-android: nRF · Android ↗
  cta-firmware: Скачать прошивку ↓
  changelog: Протокол изменений
  firmware: Прошивка
  descr: лучшее решение для обновления прошивки. Установите и запустите приложение. На вкладке `Scan` найдите устройство и нажмите кнопку `connect`. На открывшейся вкладке, рядом с кнопкой `disconnect`, нажмите на значок `DFU`. Выберите ранее загруженный файл прошивки `app_update.bin` в файловой системе. Выберите `Test and Confirm` и нажмите `Ok`. Через 15 секунд файл будет передан, проверен, и устройство перезагрузится. Батарея должна быть новой.
  descr2: Начиная с версии прошивки 0.21 вы можете использовать более простое и интуитивно понятное приложение для обновления прошивки
  update-first: Пожалуйста сначала обновите прошивку
