update:
  how-to: How to update
  eyebrow: Firmware update
  title-line1: Use nRF Connect.
  title-line2: It just works.
  intro: 'We don''t ship in-browser OTA. Nordic''s free nRF Connect for Mobile is the industry-standard tool for nRF52 firmware updates — battle-tested, recoverable, supported on both platforms. Use it.'
  callout-eyebrow: Why not in-browser?
  callout-body: 'A failed OTA on a vario can brick it. Native MCUmgr clients handle retry, error recovery and signature validation. A web app over flaky BLE can''t match that safely. Until SMP-over-WebBLE has a recovery path — use the native tool.'
  step-1-title: Install nRF Connect Mobile
  step-1-desc: Free, Nordic-official. iOS App Store + Google Play. Works without an account.
  step-2-title: Power on your mini BT
  step-2-desc: Long-press until the LED breathes signal-orange.
  step-3-title: Open Device Manager tab
  step-3-desc: Select your mini BT from the scan list. The Device Manager card pops up.
  step-4-title: Tap Firmware Upgrade
  step-4-desc: Choose the .bin file you downloaded from flybeeper.com/firmware. Tap Start.
  step-5-title: Wait 60–90 seconds
  step-5-desc: Progress bar runs to 100%. The device reboots once. nRF Connect shows "complete".
  step-6-title: Reopen this configurator
  step-6-desc: Reconnect to verify the firmware version in the status bar matches.
  cta-ios: nRF · iOS ↗
  cta-android: nRF · Android ↗
  cta-firmware: Get firmware ↓
  changelog: Changelog
  firmware: Firmware
  descr: is the best solution to use for update firmware. Install and launch the application. On the tab `Scan`, look for a device and click `connect` button. On the tab that opens, close to the button `disconnect`, click on the icon `DFU`. Select the previously downloaded firmware file `app_update.bin` in the file system. Select the `Test and Confirm` and press `Ok`. After 15 seconds the file will be transferred, verified and the device will reboot. Battery mist be full.
  descr2: Starting from fw version 0.21 you can use a simpler and more intuitive application for updating firmware
  update-first: Update firmware first, please.
  available-eyebrow: UPDATE AVAILABLE
  available-body: 'Your device is on FW {current}; FW {latest} is published.'
