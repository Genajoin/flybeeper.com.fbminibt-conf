about:
  p1: FlyBeeper - Devices for paragliders and hang gliders. The devices feature various sensors. Processed data is transmitted via Bluetooth.
  p2: This web application can connect to the device, change its settings, and display all data transmitted from the device. Here you can find the latest firmware version, changelog, and a description of the update procedure. Additionally, with permission, satellite navigation data can be displayed.
  location-permission: Request Location Access
  geo-granted: Location access granted
  geo-denied: Location access denied. Open browser settings to grant permission.
  p3: The application can be installed and used offline.
  install-app: Install Application
  p4: Detailed project description can be found on the project page.
  link-description: Project Page
  link-market: FlyBeeper Shop
  alpisto-eyebrow: BUILT BY ALPISTO
  alpisto-title: Working code, not slide decks.
  alpisto-body: 'FlyBeeper hardware and firmware come out of Alpisto — a solo engineering practice in Tolmin, Slovenia, run by Evgeny Istomin. Twenty years of nRF52 firmware, BLE protocols, KiCad PCBs and back-end glue, delivered hands-on. No outsourcing, no slide decks.'
  alpisto-services: 'Embedded BLE (nRF52, Zephyr, ESP32) · IoT back-ends (FastAPI, NATS, MQTT) · MATLAB → Python migrations · technical due diligence.'
  alpisto-address: 'Rutarjeva ulica 15, 5220 Tolmin, Slovenia · VAT SI91102227'
  alpisto-cta: Visit alpisto.eu
  contact-eyebrow: GET IN TOUCH
  contact-title: Send a message
  contact-body: 'Bug reports, hardware questions, partnership ideas — drop a note. Replies arrive within two working days.'
  contact-name: Name
  contact-name-ph: Optional
  contact-email: Email
  contact-email-ph: 'you{''@''}example.com'
  contact-message: Message
  contact-message-ph: What's on your mind?
  contact-send: Send message
  contact-sending: Sending…
  contact-success-eyebrow: SENT
  contact-success-body: Thanks — your message landed. You will hear back at the address you provided.
  contact-error-eyebrow: SEND FAILED
  contact-error-body: 'Could not reach the form endpoint. Check your connection and try again, or email hello{''@''}alpisto.eu directly.'
  fbminibt-p1: Variometer with Bluetooth and wireless buttons. Audible climb rate indication based on user-defined curves. The battery is cold-resistant.
  fbps1-p1: Always available for Bluetooth connection external barometer. High sensitivity and stability with minimal delays. Turn any smartphone into a reliable variometer.
  fbrc4-p1: 4 external buttons are always available for connecting via Bluetooth.
  fbtas-p1: Autonomous true airspeed sensor with Bluetooth.
  fbfanet-p1: External Bluetooth-controlled radio transmitter with a customizable channel for receiving FANET, ADS-L or the like. Send and receive any data without an Internet connection.
  fbfanetvario-p1: External FANET with Bluetooth and variometer in one device with a solar panel. Send and receive FANET packets without an internet connection. Use it as a sensitive variometer and source of barometric altitude for smartphone apps.
  fbsv-p1: Super-light variometer with Bluetooth, solar panel, and supercapacitor. Operates from -25 to +65 °C. 500k charge/discharge cycles. 60 seconds of USB Type C charging to 100% or 15 minutes of sunlight for activation. Always ready with a "perpetual" battery.

