update:
  how-to: Wie man aktualisiert
  eyebrow: Firmware-Update
  title-line1: Nutze nRF Connect.
  title-line2: Es funktioniert einfach.
  intro: 'Wir liefern kein In-Browser-OTA. Nordics kostenloses nRF Connect for Mobile ist das Standard-Tool für nRF52-Firmware-Updates — erprobt, mit Recovery, auf beiden Plattformen verfügbar. Nimm es.'
  callout-eyebrow: Warum nicht im Browser?
  callout-body: 'Ein fehlgeschlagenes OTA kann ein Vario unbrauchbar machen. Native MCUmgr-Clients beherrschen Retry, Recovery und Signaturprüfung. Eine Web-App über instabiles BLE kann das nicht sicher. Solange SMP-over-WebBLE keinen Recovery-Pfad hat — nimm das native Tool.'
  step-1-title: nRF Connect Mobile installieren
  step-1-desc: Kostenlos, offiziell von Nordic. iOS App Store + Google Play. Ohne Account.
  step-2-title: mini BT einschalten
  step-2-desc: Lange drücken, bis die LED orange atmet.
  step-3-title: Device Manager öffnen
  step-3-desc: Wähle dein mini BT aus der Scan-Liste. Die Device-Manager-Karte erscheint.
  step-4-title: Firmware Upgrade tippen
  step-4-desc: Wähle die .bin-Datei von flybeeper.com/firmware. Auf Start tippen.
  step-5-title: 60–90 Sekunden warten
  step-5-desc: Fortschrittsbalken läuft auf 100%. Gerät bootet einmal neu. nRF Connect zeigt „complete".
  step-6-title: Konfigurator neu öffnen
  step-6-desc: Erneut verbinden und prüfen, dass die Firmware-Version in der Statuszeile passt.
  cta-ios: nRF · iOS ↗
  cta-android: nRF · Android ↗
  cta-firmware: Firmware laden ↓
  changelog: Änderungsprotokoll
  firmware: Firmware
  descr: ist die beste Lösung zum Aktualisieren der Firmware. Installieren und starten Sie die Anwendung. Auf der Registerkarte `Scan` suchen Sie nach einem Gerät und klicken Sie auf die Schaltfläche `connect`. Auf der geöffneten Registerkarte, neben der Schaltfläche `disconnect`, klicken Sie auf das Symbol `DFU`. Wählen Sie die zuvor heruntergeladene Firmware-Datei `app_update.bin` im Dateisystem aus. Wählen Sie `Test and Confirm` und drücken Sie `Ok`. Nach 15 Sekunden wird die Datei übertragen, überprüft und das Gerät wird neu gestartet. Der Akku muss voll sein.
  descr2: Ab fw Version 0.21 können Sie eine einfachere und intuitivere Anwendung zum Aktualisieren der Firmware verwenden
  update-first: Bitte zuerst die Firmware aktualisieren.
