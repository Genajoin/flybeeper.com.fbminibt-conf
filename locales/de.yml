about:
  p1: FlyBeeper - Geräte für Gleitschirme und Drachenflieger. Die Geräte verfügen über verschiedene Sensoren. Die verarbeiteten Daten werden über Bluetooth übertragen.
  p2: Diese Webanwendung kann eine Verbindung zum Gerät herstellen, dessen Einstellungen ändern und alle vom Gerät übertragenen Daten anzeigen. Hier können Sie die neueste Firmware-Version, den Änderungsverlauf und eine Beschreibung des Update-Vorgangs finden. Darüber hinaus können bei Erlaubnis die Daten der Satellitennavigation angezeigt werden.
  location-permission: Standortzugriff anfordern
  geo-granted: Standortzugriff gewährt
  geo-denied: Standortzugriff verweigert. Öffnen Sie die Browsereinstellungen, um Berechtigungen zu erteilen.
  p3: Die Anwendung kann offline installiert und verwendet werden.
  install-app: Anwendung installieren
  p4: Eine ausführliche Projektbeschreibung finden Sie auf der Projektseite.
  link-description: Projektseite
  link-blog: Projektseite
  link-market: FlyBeeper-Shop
  fbtas-p1: Autonomer wahre Luftgeschwindigkeitssensor mit Bluetooth.
  fbminibt-p1: Variometer mit Bluetooth und drahtlosen Tasten. Hörbare Steigrate-Anzeige basierend auf benutzerdefinierten Kurven. Die Batterie ist kälteresistent.
  fbps1-p1: Immer verfügbar für Bluetooth-Verbindung externer Barometer. Hohe Empfindlichkeit und Stabilität mit minimalen Verzögerungen. Verwandeln Sie jedes Smartphone in einen zuverlässigen Variometer.
  fbrc4-p1: 4 externe Tasten sind immer für die Verbindung über Bluetooth verfügbar.
  fbfanet-p1: Externer Funksender mit Bluetooth-Steuerung zum Empfang von FANET-, ADS-L- oder ähnlichen Funkpaketen. Senden und empfangen Sie beliebige Daten ohne Internetverbindung.
  fbfanetvario-p1: Externer FANET mit Bluetooth und Variometer in einem Gehäuse mit Solarpanel. Senden und Empfangen von FANET-Paketen ohne Internetverbindung. Verwenden Sie es als empfindliches Variometer und als Quelle für barometrische Höhenangaben für Smartphone-Apps.
  fbsv-p1: Ein kleines Variometer mit Bluetooth, Solarpanel und Superkondensator. Funktioniert von -25 bis +65 °C. 500k Lade-/Entladezyklen. 60 Sekunden USB Type C Aufladung bis 100% oder 15 Minuten Sonne zum Einschalten. Immer bereit mit einer "ewigen" Batterie.

